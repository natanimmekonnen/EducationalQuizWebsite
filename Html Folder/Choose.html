<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Educational Quiz</title>
    <link rel="stylesheet" href="\Css Folder\styles.css" />
  </head>
  <body>
    <div id="progressbar">
      <div id="progressbarfull"></div>
    </div>

    <div class="container">
      <!-- <header>
            <h1>Educational Quiz</h1>
        </header> -->

      <div class="card">
        <div id="counter">
          <div id="counter-item">
            <p class="counter-prefix">Question</p>
            <h1 class="counter-text" id="questionCounter"></h1>
          </div>
          <div id="counter-item">
            <p class="counter-prefix">Score</p>
            <h1 class="counter-text" id="score">0</h1>
          </div>
        </div>
        <p id="question">How many spikes does a porcupine have?</p>
        <div class="list">
          <button class="option" data-number="1">1000</button>
          <button class="option" data-number="2">5000</button>
          <button class="option" data-number="3">10000</button>
          <button class="option" data-number="4">20000</button>
        </div>
      </div>
    </div>
  </body>
  <script src="\JavaScript Folder\One.js"></script>
</html>
